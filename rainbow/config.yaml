# Rainbow Intelligence Engine — Configuration Template
# Copy to rainbow.yml and customize

log_level: INFO
log_format: text  # text | json

db_path: rainbow/storage/signals.db

market_data:
  bitget_base_url: https://api.bitget.com
  coingecko_base_url: https://api.coingecko.com/api/v3
  default_interval: 1h
  default_candle_limit: 200

api:
  host: 0.0.0.0
  port: 8000

scorer:
  weights:
    technical: 0.4
    sentiment: 0.3
    social: 0.2
    news: 0.1

evaluation:
  enabled: false                    # R7-Gate: erst aktivieren nach R7-Evidenz
  provider: ollama_cloud
  base_url_env: RAINBOW_LLM_BASE_URL
  api_key_env: RAINBOW_LLM_API_KEY
  primary_model: deepseek-v4-pro
  fallback_model: deepseek-v4-flash
  temperature: 0.1
  summary_temperature: 0.15
  timeout_seconds: 6.0
  threshold: 0.55
  cache_ttl_seconds: 300
  max_reviews_per_cycle: 10

collectors:
  ta:
    enabled: true
    interval_seconds: 60
    assets:
      - BTC
      - ETH
      - SOL
    params:
      timeframes:
        - 1h
        - 4h
  # twitter:
  #   enabled: false
  #   interval_seconds: 120
  # reddit:
  #   enabled: false
  #   interval_seconds: 300
  # news:
  #   enabled: false
  #   interval_seconds: 300
