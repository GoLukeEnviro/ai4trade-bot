# Rainbow Intelligence Engine — Configuration Template
# Copy to rainbow.yml and customize

log_level: INFO
log_format: text  # text | json

db_path: rainbow/storage/signals.db

market_data:
  bitget_base_url: https://api.bitget.com
  coingecko_base_url: https://api.coingecko.com/api/v3
  default_interval: 1h
  default_candle_limit: 200

api:
  host: 0.0.0.0
  port: 8000

scorer:
  weights:
    technical: 0.4
    sentiment: 0.3
    social: 0.2
    news: 0.1

evaluation:
  enabled: true
  provider: "deepseek"
  model: "deepseek-v4-pro"
  min_confidence_to_evaluate: 0.60
  max_tokens: 1024
  timeout_seconds: 30
  retry_attempts: 2
  critic:
    enabled: false
    trigger_on_priority: ["high", "critical"]
    trigger_on_risk_score_above: 0.70

collectors:
  ta:
    enabled: true
    interval_seconds: 60
    assets:
      - BTC
      - ETH
      - SOL
    params:
      timeframes:
        - 1h
        - 4h
  # twitter:
  #   enabled: false
  #   interval_seconds: 120
  # reddit:
  #   enabled: false
  #   interval_seconds: 300
  # news:
  #   enabled: false
  #   interval_seconds: 300
  derivatives:
    enabled: true
    assets: ["BTC/USDT:USDT", "ETH/USDT:USDT", "SOL/USDT:USDT"]
    interval_seconds: 300
    params:
      funding_extreme_threshold: 0.0005
      oi_spike_multiplier: 1.5
