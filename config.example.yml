# AI4Trade Bot Configuration (Optional)
# .env überschreibt YAML-Werte bei Konflikten

assets:
  - BTC/USDT
  - ETH/USDT
  - SOL/USDT

data_interval: 60
sentiment_interval: 300
heartbeat_interval: 30
confidence_threshold: 60

exchange:
  provider: bitget

llm:
  provider: claude
  model: ""

monitoring:
  metrics_port: 9090

database:
  path: storage/bot.db
