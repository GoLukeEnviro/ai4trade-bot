# Standalone Rainbow Service (für lokales Testen / Entwicklung)
#
# Verwendung (vom ai4trade-bot Repo-Root):
#   docker compose -f docs/r4/standalone-rainbow.yml up -d
#
# Zum Testen lokal mit Port (nur für Standalone!):
#   docker compose -f docs/r4/standalone-rainbow.yml up -d
#   curl http://localhost:18080/health
#   curl http://localhost:18080/signals/canonical/latest
#   open http://localhost:18081
#
# WICHTIG:
# - Dieser Compose ist nur für Standalone gedacht.
# - Für die Integration in trading-hub siehe docs/r4/trading-hub-integration.md
# - Kein Production-Exposure hier.

services:
  rainbow:
    build:
      context: ../..
      dockerfile: rainbow.Dockerfile
    # Für Standalone-Tests Port freigeben (intern 8000 → Host 18080)
    # In trading-hub Integration darf dieser Port NICHT exposed werden!
    ports:
      - "18080:8000"
    volumes:
      # Persistenz für Signale + Heartbeat
      - rainbow_data:/app/rainbow/storage
      # Interne Config (TA-only, secret-frei) -- relative to this compose file dir
      - ./rainbow.internal.yml:/app/rainbow/config.yaml:ro
    environment:
      # Logging für bessere Lesbarkeit beim Testen
      RAINBOW_LOG_LEVEL: INFO
      RAINBOW_LOG_FORMAT: text
      # R7 safety baseline: no delivery worker may dispatch signals.
      AI4TRADE_DELIVERY_MODE: off
    restart: unless-stopped
    healthcheck:
      # HTTP /health — zuverlässiger als Heartbeat-Datei-Pfad für Standalone-Tests
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"
      interval: 15s
      timeout: 10s
      start_period: 30s
      retries: 5

  dashboard:
    image: nginx:alpine
    ports:
      - "18081:80"
    volumes:
      - ./dashboard:/usr/share/nginx/html:ro
      - ./dashboard/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      rainbow:
        condition: service_healthy
    restart: unless-stopped

volumes:
  rainbow_data:
